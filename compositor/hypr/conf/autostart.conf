###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = kitty -e lf
$menu = rofi -show drun -config ~/.config/rofi/config.rasi


#################
### AUTOSTART ###
#################

exec-once = /usr/lib/gnome-keyring-daemon --start --components=secrets,pkcs11
exec-once = awww-daemon
exec-once = bash -c 'IMG=$(ls ~/Pictures/wallpapers/*.{jpg,jpeg,png,webp} 2>/dev/null | shuf -n1); ~/.config/hypr/set-wallpaper.sh "$IMG"'
exec-once = quickshell & hypridle & swaync
exec-once = systemctl --user start hyprpolkitagent
exec-once = systemctl --user start xdg-desktop-portal-hyprland
exec-once = udiskie &
exec-once = bash ~/.config/hypr/fix-bt-profile.sh &


