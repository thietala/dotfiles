# ── Ly display manager config ─────────────────────────────────────────────────
# Color format: 0xSSRRGGBB  (SS = styling flags, see below)
# Styling: TB_BOLD=0x01  TB_UNDERLINE=0x02  TB_ITALIC=0x08  TB_HI_BLACK=0x20  TB_BRIGHT=0x40
#
# Theme palette (matches Hyprland/Waybar setup):
#   Background  #0a0a0f   →  0x000a0a0f
#   Foreground  #e0e0e0   →  0x00e0e0e0
#   Cyan accent #33ccff   →  0x0033ccff
#   Green       #00ff99   →  0x0000ff99
#   Error red   #ff4466   →  0x00ff4466
#   True black  TB_HI_BLACK→  0x20000000

# ── Authentication ─────────────────────────────────────────────────────────────
allow_empty_password = false
auth_fails = 10
clear_password = true

# ── Appearance ─────────────────────────────────────────────────────────────────
bg                = 0x000a0a0f
fg                = 0x00e0e0e0
border_fg         = 0x0033ccff
error_bg          = 0x00000000
error_fg          = 0x01ff4466

# ── Login box ──────────────────────────────────────────────────────────────────
blank_box         = true
hide_borders      = false
box_title         = null
margin_box_h      = 2
margin_box_v      = 1
input_len         = 34
text_in_center    = false
default_input     = login

# ── Clock ──────────────────────────────────────────────────────────────────────
clock             = %H:%M  %a %d %b
bigclock          = none

# ── Animation: matrix with cyan to match the theme ────────────────────────────
animation         = matrix
animation_timeout_sec = 0
cmatrix_fg        = 0x0033ccff
cmatrix_head_col  = 0x41e0ffff
cmatrix_min_codepoint = 0x21
cmatrix_max_codepoint = 0x7B

# ── Misc ───────────────────────────────────────────────────────────────────────
hide_version_string = true
hide_key_hints    = false
full_color        = true
save              = true
lang              = en
numlock           = false
asterisk          = 0x2022

# ── Key hints (shown at bottom) ────────────────────────────────────────────────
shutdown_key      = F1
restart_key       = F2
sleep_key         = F3

# ── Sessions ──────────────────────────────────────────────────────────────────
waylandsessions   = /usr/share/wayland-sessions
xsessions         = /usr/share/xsessions
custom_sessions   = /etc/ly/custom-sessions

# ── Commands ──────────────────────────────────────────────────────────────────
shutdown_cmd      = /sbin/shutdown -a now
restart_cmd       = /sbin/shutdown -r now
setup_cmd         = /etc/ly/setup.sh
path              = /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
