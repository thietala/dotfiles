# Purple Glass — Starship prompt

"$schema" = 'https://starship.rs/config-schema.json'

format = """
[$directory](fg:#e8e0f0) \
[$git_branch$git_status](fg:#9b7bc4)\
$character"""

[os]
disabled = true

[username]
disabled = true

[directory]
style = "fg:#e8e0f0"
format = "[$path ]($style)"
truncation_length = 4
truncation_symbol = "…/"
home_symbol = "~"

[git_branch]
symbol = " "
style = "fg:#9b7bc4"
format = "[$symbol$branch ]($style)"

[git_status]
style = "fg:#8a6aae"
format = "[$all_status$ahead_behind ]($style)"
conflicted = "⚡"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = " "
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[character]
success_symbol = "[❯](bold fg:#9b7bc4)"
error_symbol = "[❯](bold fg:#e06b6b)"
