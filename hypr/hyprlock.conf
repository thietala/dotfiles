$font = JetBrainsMono Nerd Font

general {
    hide_cursor = true
}

animations {
    enabled = true
    bezier = smooth, 0.23, 1, 0.32, 1
    animation = fadeIn,  1, 5, smooth
    animation = fadeOut, 1, 5, smooth
    animation = inputFieldDots, 1, 2, smooth
}

# ── Background — blurred screenshot with deep purple tint ────────────────────
background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 7
    color = rgba(1a0e3888)
}

# ── Time-aware greeting ───────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:60000] bash -c 'h=$(date +%H); if [ $h -lt 12 ]; then echo "Good morning"; elif [ $h -lt 17 ]; then echo "Good afternoon"; else echo "Good evening"; fi'
    font_size = 20
    font_family = $font
    color = rgba(168, 152, 200, 0.85)

    position = 0, 230
    halign = center
    valign = center
}

# ── Clock — big and centered ──────────────────────────────────────────────────
label {
    monitor =
    text = $TIME
    font_size = 110
    font_family = $font
    color = rgba(232, 224, 240, 1.0)

    position = 0, 80
    halign = center
    valign = center
}

# ── Date ─────────────────────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y"
    font_size = 20
    font_family = $font
    color = rgba(155, 123, 196, 0.95)

    position = 0, -30
    halign = center
    valign = center
}

# ── Divider ───────────────────────────────────────────────────────────────────
label {
    monitor =
    text = ───────────────────────
    font_size = 12
    font_family = $font
    color = rgba(110, 85, 150, 0.40)

    position = 0, -70
    halign = center
    valign = center
}

# ── Password input ────────────────────────────────────────────────────────────
input-field {
    monitor =
    size = 280, 48
    outline_thickness = 2
    inner_color = rgba(26, 14, 56, 0.55)

    outer_color = rgba(9b7bc4cc) rgba(8a6aaecc) 45deg
    check_color = rgba(8a6aaecc) rgba(9b7bc4cc) 45deg
    fail_color  = rgba(ffb4abcc) rgba(e06b6bcc) 45deg

    font_color = rgb(232, 224, 240)
    fade_on_empty = true
    rounding = 14

    font_family = $font
    placeholder_text = <span foreground="##8878a8"><i>  password</i></span>
    fail_text = <span foreground="##ffb4ab"><i>$PAMFAIL</i></span>

    dots_spacing = 0.35
    dots_center = true

    capslock_color = rgba(ffb4abcc) rgba(e06b6bcc) 45deg

    position = 0, -130
    halign = center
    valign = center
}

# ── Hint below input ──────────────────────────────────────────────────────────
label {
    monitor =
    text = press <b>Enter</b> to unlock
    font_size = 11
    font_family = $font
    color = rgba(136, 120, 168, 0.45)

    position = 0, -185
    halign = center
    valign = center
}

# ── Keyboard layout — bottom right ────────────────────────────────────────────
label {
    monitor =
    text =  $LAYOUT[fi]
    font_size = 13
    font_family = $font
    color = rgba(136, 120, 168, 0.6)
    onclick = hyprctl switchxkblayout all next

    position = -30, 30
    halign = right
    valign = bottom
}

