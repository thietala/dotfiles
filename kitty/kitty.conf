# ── Font ───────────────────────────────────────────────────────────────────────

font_family      JetBrains Mono
bold_font        JetBrains Mono Bold
italic_font      JetBrains Mono Italic
bold_italic_font JetBrains Mono Bold Italic
font_size        13.0

# ── Cursor ─────────────────────────────────────────────────────────────────────

cursor                  #33ccff
cursor_text_color       #0f0f14
cursor_shape            beam
cursor_blink_interval   0

# ── Scrollback ─────────────────────────────────────────────────────────────────

scrollback_lines 10000

# ── Window ─────────────────────────────────────────────────────────────────────

window_padding_width    12
hide_window_decorations yes
background_opacity      0.88
# Blur requires Hyprland windowrule — see below

# ── Colors ─────────────────────────────────────────────────────────────────────
# Background/foreground match waybar dark base; accents follow the
# Hyprland border gradient: cyan #33ccff → green #00ff99

background  #0f0f14
foreground  #e0e0e0
selection_background  #33ccff
selection_foreground  #0f0f14

# Black
color0  #1e1e28
color8  #595959

# Red
color1  #ff4466
color9  #ff6688

# Green  (matches active border / network)
color2  #00ff99
color10 #33ffaa

# Yellow
color3  #ffe066
color11 #ffea88

# Blue / Cyan  (matches active border / clock / audio)
color4  #33ccff
color12 #66d9ff

# Magenta  (matches mpris purple)
color5  #cc88ff
color13 #dd99ff

# Cyan
color6  #00e5cc
color14 #33ffee

# White
color7  #c0c0cc
color15 #e0e0e0

# ── Tab bar ────────────────────────────────────────────────────────────────────

tab_bar_style               powerline
tab_powerline_style         slanted
tab_bar_background          #0f0f14
tab_title_template          " {title} "
active_tab_foreground       #0f0f14
active_tab_background       #33ccff
active_tab_font_style       bold
inactive_tab_foreground     #595959
inactive_tab_background     #1e1e28
inactive_tab_font_style     normal

# ── Bell ───────────────────────────────────────────────────────────────────────

enable_audio_bell false
visual_bell_duration 0.0
