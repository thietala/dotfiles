# ── Font ───────────────────────────────────────────────────────────────────────

font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic
font_size        13.0

# ── Cursor ─────────────────────────────────────────────────────────────────────

cursor                  #9b7bc4
cursor_text_color       #1a0e38
cursor_shape            beam
cursor_blink_interval   0

# ── Scrollback ─────────────────────────────────────────────────────────────────

scrollback_lines 10000

# ── Window ─────────────────────────────────────────────────────────────────────

window_padding_width    12
hide_window_decorations yes
background_opacity      0.50

# ── Colors ─────────────────────────────────────────────────────────────────────

background  #1a0e38
foreground  #e8e0f0
selection_background  #9b7bc4
selection_foreground  #1a0e38

# Black
color0  #1e0d3a
color8  #4a3868

# Red
color1  #e06b6b
color9  #e88888

# Green
color2  #6bc4a0
color10 #88d4b8

# Yellow
color3  #c4b06b
color11 #d4c488

# Blue / Purple (primary accent)
color4  #9b7bc4
color12 #b89edd

# Magenta (secondary accent)
color5  #a87cc4
color13 #c499d8

# Cyan (desaturated)
color6  #6ba8c4
color14 #88c0d8

# White
color7  #c4b8d8
color15 #e8e0f0

# ── Tab bar ────────────────────────────────────────────────────────────────────

tab_bar_style               powerline
tab_powerline_style         slanted
tab_bar_background          #1a0e38
tab_title_template          " {title} "
active_tab_foreground       #1a0e38
active_tab_background       #9b7bc4
active_tab_font_style       bold
inactive_tab_foreground     #8878a8
inactive_tab_background     #231248
inactive_tab_font_style     normal

# ── Bell ───────────────────────────────────────────────────────────────────────

enable_audio_bell false
visual_bell_duration 0.0
